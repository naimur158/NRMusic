# -Djdk.net.unixdomain.tmpdir=C:/Temp works around a broken NIO Selector on this
# machine (unix-domain socket pipe fails in the default temp dir).
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8 -Djdk.net.unixdomain.tmpdir=C:/Temp
org.gradle.parallel=true
android.useAndroidX=true
kotlin.code.style=official
android.nonTransitiveRClass=true
