name: Build & Release APK

# Builds a signed APK and publishes it as a GitHub Release on every push to main.
# Installed CI builds then auto-update to it. Manual runs are allowed too.
on:
  push:
    branches: [ main, master ]
    paths-ignore:
      - '**.md'
      - '.gitignore'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Restore signing keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > nrmusic-release.jks
            echo "Keystore restored."
          else
            echo "::warning::KEYSTORE_BASE64 secret not set — build will fail to sign."
          fi

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build signed release APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease \
            -PversionCode=${{ github.run_number }} \
            -PversionName=1.0.${{ github.run_number }} \
            -PgithubRepo=${{ github.repository }}

      - name: Rename APK
        run: cp app/build/outputs/apk/release/app-release.apk NRMusic-v${{ github.run_number }}.apk

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: NR Music 1.0.${{ github.run_number }}
          body: |
            Automatic build from commit ${{ github.sha }}.
            Install the APK below — installed app copies auto-update to this version.
          files: NRMusic-v${{ github.run_number }}.apk
